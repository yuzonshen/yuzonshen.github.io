<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Off Days Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --border: #e0dbd2;
    --text: #1a1814;
    --muted: #7a7468;
    --accent: #c8531a;
    --accent-light: #fdf0e8;
    --tag-basic-bg: #e8f0fe; --tag-basic: #1a56a4;
    --tag-holiday-bg: #fce8e0; --tag-holiday: #b93b10;
    --tag-special-bg: #e8f5e9; --tag-special: #1a6e2c;
    --tag-other-bg: #f3eafe; --tag-other: #5b25a8;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
  }

  h1 {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  #stats {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 10px 14px 10px 38px;
    font-family: var(--mono);
    font-size: 0.85rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); }

  main {
    padding: 1.5rem 2.5rem 3rem;
    max-width: 860px;
    margin: 0 auto;
  }

  #error-msg {
    display: none;
    background: #fff3f0;
    border: 1px solid #f5c6bb;
    border-radius: 6px;
    padding: 1rem 1.25rem;
    color: #a33;
    font-size: 0.85rem;
    font-family: var(--mono);
    margin-bottom: 1.5rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    font-size: 0.88rem;
  }

  thead {
    background: #f9f8f5;
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 10px 16px;
    text-align: left;
  }

  td {
    padding: 11px 16px;
    border-bottom: 1px solid #f0ece5;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr.data-row { transition: background 0.1s; }
  tr.data-row:hover { background: #faf9f6; }
  tr.hidden { display: none; }

  .idx {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: #bbb;
    width: 36px;
  }

  .date-raw {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--muted);
    width: 110px;
  }

  .date-fmt {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.9rem;
  }

  .day-name {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: var(--sans);
    width: 80px;
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  .tag-basic    { background: var(--tag-basic-bg);   color: var(--tag-basic); }
  .tag-holiday  { background: var(--tag-holiday-bg); color: var(--tag-holiday); }
  .tag-special  { background: var(--tag-special-bg); color: var(--tag-special); }
  .tag-other    { background: var(--tag-other-bg);   color: var(--tag-other); }

  #no-results {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  #loading {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .dot { animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  @media (max-width: 600px) {
    header { padding: 1.25rem 1rem 1rem; }
    main { padding: 1rem 1rem 2rem; }
    .date-raw { display: none; }
    .day-name { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Off Days <span>//</span> Viewer</h1>
    <span id="stats">—</span>
  </div>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Search by date, day, or type…" oninput="filterRows()" />
  </div>
</header>

<main>
  <div id="error-msg"></div>
  <div id="loading">Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  <table id="table" style="display:none;">
    <thead>
      <tr>
        <th class="idx">#</th>
        <th>Formatted Date</th>
        <th class="date-raw">Raw</th>
        <th class="day-name">Day</th>
        <th>Type</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="no-results">No entries match your search.</div>
</main>

<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function formatDate(raw) {
  if (!/^\d{8}$/.test(raw)) return raw;
  return raw.slice(0,4) + '-' + raw.slice(4,6) + '-' + raw.slice(6,8);
}

function getDayName(raw) {
  if (!/^\d{8}$/.test(raw)) return '';
  const y = +raw.slice(0,4), m = +raw.slice(4,6)-1, d = +raw.slice(6,8);
  return DAYS[new Date(y, m, d).getDay()];
}

function tagClass(val) {
  const v = val.toLowerCase();
  if (v === 'basic')   return 'tag-basic';
  if (v.includes('holiday')) return 'tag-holiday';
  if (v.includes('special')) return 'tag-special';
  return 'tag-other';
}

let allRows = [];

function render(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(([i, raw, val]) => {
    const fmt  = formatDate(raw);
    const day  = getDayName(raw);
    const tr = document.createElement('tr');
    tr.className = 'data-row';
    tr.innerHTML = `
      <td class="idx">${i+1}</td>
      <td class="date-fmt">${fmt}</td>
      <td class="date-raw">${raw}</td>
      <td class="day-name">${day}</td>
      <td><span class="tag ${tagClass(val)}">${val}</span></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('no-results').style.display = rows.length === 0 ? 'block' : 'none';
  document.getElementById('stats').textContent = rows.length + ' / ' + allRows.length + ' entries';
}

function filterRows() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  if (!q) { render(allRows); return; }
  render(allRows.filter(([i, raw, val]) =>
    raw.includes(q) ||
    formatDate(raw).includes(q) ||
    getDayName(raw).toLowerCase().includes(q) ||
    val.toLowerCase().includes(q)
  ));
}
//Modify this
target_url = "https://<>.github.io/off_days.js";
async function loadData() {
  try {
    const res = await fetch(target_url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch {
      const match = text.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('Could not parse data');
      data = JSON.parse(match[0]);
    }
    allRows = [];
    data.forEach((obj, i) => {
      Object.entries(obj).forEach(([k, v]) => allRows.push([allRows.length, k, String(v)]));
    });
    document.getElementById('loading').style.display = 'none';
    document.getElementById('table').style.display = '';
    render(allRows);
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.style.display = 'block';
    el.textContent = 'Failed to load data: ' + err.message;
  }
}

loadData();
</script>
</body>
</html>
